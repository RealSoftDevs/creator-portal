[build]
command = "prisma generate && next build"
publish = ".next"

[build.environment]
NODE_VERSION = "20"
NEXT_TELEMETRY_DISABLED = "1"

[[redirects]]
from = "/api/*"
to = "/api/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Ignore secrets scanning for public environment variables
[build.processing]
skip_processing = true

[build.processing.secrets_scanning]
enabled = false